{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 40px auto;">
    <div class="card">
        <h2 style="margin-bottom:20px">Create New Project</h2>
        <form method="POST">
            <label>Project Name</label>
            <input type="text" name="name" required placeholder="Enter project name">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Enter project description"></textarea>
            <button type="submit" class="btn btn-primary" style="width:100%">Create Project</button>
        </form>
        <p style="text-align:center; margin-top:15px">
            <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
